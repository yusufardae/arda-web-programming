<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="author" content="INSPIRO" />
    <meta name="description" content="Themeforest Template Polo, html template">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Document title -->
    <title>MARS - Log in</title>
    <!-- Stylesheets & Fonts -->
    <link href="css/plugins.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<style>
    /* Force only logo text + main menu links to be white on this page */
    #header #logo .logo-default,
    #header #logo .logo-dark,
    #header #mainMenu nav>ul>li>a {
        color: #ffffff !important;
    }

    #terms_conditions3 + label a {
    color: #f70a0a;
    }
    
    .form-check-input:checked{
        background-color: #f70a0a;
        border-color: #f70a0a;
    }

    .btn {
        transition: all 0.3s ease;
    }

    .btn-light:hover {
        background-color: #f70a0a !important;
        color: #ffffff !important;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(247, 10, 10, 0.3);
    }

    .btn-primary:hover {
        background-color: #d60808 !important;
        color: #ffffff !important;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(247, 10, 10, 0.3);
    }

    </style>


<body>
    <!-- Body Inner -->
    <div class="body-inner">
        <!-- Header -->
        <header id="header" class="header-disable-fixed" data-fullwidth="true" data-transparent="true">
            <div class="header-inner">
                <div class="container">
                    <!--Logo-->
                    <div id="logo">
                        <a href="{{ url_for('index') }}">
                            <span class="logo-default">MARS</span>
                            <span class="logo-dark">MARS</span>
                        </a>
                    </div>
                    <!--End: Logo-->
                    <!--Navigation Resposnive Trigger-->
                    <div id="mainMenu-trigger">
                        <a class="lines-button x"><span class="lines"></span></a>
                    </div>
                    <!--end: Navigation Resposnive Trigger-->
                    <!--Navigation-->
                    <div id="mainMenu">
                        <div class="container">
                            <nav>
                                <ul>
                                    <li><a href="{{ url_for('index') }}">Home</a></li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                    <!--end: Navigation-->
                </div>
            </div>
        </header>
        <!-- end: Header -->
        <!-- Page title -->
        <section id="page-title" class="text-light background-theme">
            <div class="container">
                <div class="page-title">
                    <h1>User login</h1>
                    <span>User login page</span>
                </div>
                <div class="breadcrumb">
                    <ul>
                        <li><a href="{{ url_for('index') }}">Home</a>
                        </li>
                        <li class="active">User login
                        </li>
                    </ul>
                </div>
            </div>
        </section>
        <!-- end: Page title -->
        <!-- Section -->
        <section>
            <div class="container-fluid d-flex flex-column">
                <div class="row align-items-center">
                    <div class="col-md-6 col-lg-4 col-xl-3 mx-auto">
                        <div class="mb-5 text-center">
                            <h6 class="h3 mb-1">Login</h6>
                            <p class="text-muted mb-0">Sign in to your account to continue.</p>
                        </div>
                        {% include '_flash_messages.html' %}
                        <span class="clearfix"></span>
                        <form class="form-validate" method="post" action="{{ url_for('login') }}">
                            <div class="form-group">
                                <label for="email">Email address</label>
                                <div class="input-group">
                                    <input type="email" class="form-control" name="email" placeholder="Enter your email" value="{{ form_data.get('email', '') }}" required="">
                                    <span class="input-group-text"><i class="icon-user"></i></span>
                                </div>
                            </div>
                            <div class="form-group ">
                                <label for="password">Password</label>
                                <div class="input-group show-hide-password">
                                    <input class="form-control" name="password" placeholder="Enter password" type="password" required="">
                                    <span class="input-group-text"><i class="icon-eye-off" aria-hidden="true" style="cursor: pointer;"></i></span>
                                </div>
                            </div>
                            <div class="mt-4">
                                <button style="background-color: #f70a0a;border-color: #f70a0a;" type="submit" class="btn btn-primary btn-block btn-primary">Sign in</button>
                            </div>
                        </form>
                        <div class="mt-4 text-center"><small>Not registered?</small> <a href="{{ url_for('joinus') }}" style="color: #f70a0a;" class="small fw-bold">Create account</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- end: Section -->
                <!-- Footer -->
        <footer id="footer" style="background-color: #ffffff;">
            <div class="copyright-content"
                style="min-height: auto !important; padding: 15px 0 !important; background-color: #ffffff !important;">
                <div class="container">
                    <div class="copyright-text text-center" style="color: #1e2022; font-size: 12px; margin: 0;">&copy; 2026 MARS
                        - All rights reserved.</div>
                </div>
            </div>
        </footer>
        <!-- end: Footer -->
    </div>
    <!-- end: Body Inner -->
    <!--Plugins-->
    <script src="js/jquery.js"></script>
    <script src="js/plugins.js"></script>
    <!--Template functions-->
    <script src="js/functions.js"></script>
</body>

</html>
